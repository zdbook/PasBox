name: Pasbox 单一系统全自动交叉编译发布

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  REPO_NAME: ${{ github.repository }}
  WORKSPACE: ${{ github.workspace }}
  DEPENDENCY_MAIN: "https://github.com/zdbook/Pasbox-Deps.git"
  DEPENDENCY_BACKUP1: "https://gitee.com/zdbook/Pasbox-Deps.git"
  DEPENDENCY_BACKUP2: "https://gitlab.com/zdbook/Pasbox-Deps.git"

jobs:
  build:
    name: 统一交叉编译 (Ubuntu )
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装 Lazarus 和 FPC
        uses: gcarreno/setup-lazarus@v3.2.17
        with:
          lazarus-version: stable
          with-cache: true

      - name: 安装交叉编译工具链和系统依赖
        run: |
          sudo apt-get update
          # 安装 Linux 编译依赖
          sudo apt-get install -y libgtk2.0-dev libssl-dev libcurl4-openssl-dev
          # 安装 Windows 交叉编译工具 (MinGW)
          sudo apt-get install -y mingw-w64
          # 安装 binutils 以支持多架构处理
          sudo apt-get install -y binutils-multiarch

      - name: 配置 FPC 交叉编译器 (Linux to Windows)
        run: |
          # 编译并安装 Windows 64位交叉编译器单元
          # 注意：/usr/share/fpcsrc 是 setup-lazarus 默认的源码路径
          FPC_VER=$(fpc -iV)
          cd /usr/share/fpcsrc/$FPC_VER
          sudo make crossinstall CPU_TARGET=x86_64 OS_TARGET=win64 INSTALL_PREFIX=/usr
          sudo ln -sf /usr/lib/fpc/$FPC_VER/ppcrossx64 /usr/bin/ppcrossx64
          
          # 编译并安装 Windows 32位交叉编译器单元
          sudo make crossinstall CPU_TARGET=i386 OS_TARGET=win32 INSTALL_PREFIX=/usr
          sudo ln -sf /usr/lib/fpc/$FPC_VER/ppcross386 /usr/bin/ppcross386

      - name: 自动获取依赖库 (带容错机制)
        run: |
          echo "正在尝试从主地址获取依赖..."
          if git clone $DEPENDENCY_MAIN deps; then
            echo "成功从主地址获取依赖。"
          elif git clone $DEPENDENCY_BACKUP1 deps; then
            echo "主地址失败，成功从备用地址1获取依赖。"
          elif git clone $DEPENDENCY_BACKUP2 deps; then
            echo "备用地址1失败，成功从备用地址2获取依赖。"
          else
            echo "所有地址均失败，请检查网络或仓库地址！" && exit 1
          fi
          echo "PPC_CONFIG_PATH=$GITHUB_WORKSPACE/deps" >> $GITHUB_ENV

      - name: 执行多平台交叉编译
        run: |
          mkdir -p output/linux_x64 output/win_x64 output/win_x86
          
          echo "--- 编译 Linux x86_64 ---"
          lazbuild --cpu=x86_64 --os=linux src/pascalcoin_daemon.lpi
          lazbuild --cpu=x86_64 --os=linux src/pascalcoin_wallet_classic.lpi
          cp src/pascalcoin_daemon output/linux_x64/
          cp src/pascalcoin_wallet_classic output/linux_x64/

          echo "--- 编译 Windows x86_64 ---"
          lazbuild --cpu=x86_64 --os=win64 src/pascalcoin_daemon.lpi
          lazbuild --cpu=x86_64 --os=win64 src/pascalcoin_wallet_classic.lpi
          cp src/pascalcoin_daemon.exe output/win_x64/
          cp src/pascalcoin_wallet_classic.exe output/win_x64/

          echo "--- 编译 Windows i386 ---"
          lazbuild --cpu=i386 --os=win32 src/pascalcoin_daemon.lpi
          lazbuild --cpu=i386 --os=win32 src/pascalcoin_wallet_classic.lpi
          cp src/pascalcoin_daemon.exe output/win_x86/
          cp src/pascalcoin_wallet_classic.exe output/win_x86/

      - name: 打包所有平台产物
        run: |
          cd output
          zip -r ../pasbox-all-platforms.zip .
          cd ..

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: pasbox-unified-build
          path: pasbox-all-platforms.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: pasbox-unified-build

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: pasbox-all-platforms.zip
          body: |
            Pasbox 统一交叉编译版本 ${{ github.ref_name }}
            构建环境: Ubuntu Latest
            包含平台: Linux x64, Windows x64, Windows x86
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
